<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Focus Group Simulator</title>
    <style>
        :root {
            --primary: #ff6d5a;
            --primary-hover: #e65b49;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 550px;
        }

        h2 {
            margin-top: 0;
            color: var(--primary);
            text-align: center;
            font-size: 24px;
            border-bottom: 2px solid var(--bg);
            padding-bottom: 15px;
        }

        .field {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #response {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            text-align: center;
            font-size: 14px;
            line-height: 1.5;
        }

        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="card">
    <h2>Symulacja Grupy Fokusowej</h2>
    <form id="focusForm">
        <div class="field">
            <label>Temat dyskusji:</label>
            <input type="text" name="topic" placeholder="np. Wpływ AI na rynek pracy" required>
        </div>

        <div class="field">
            <label>Główne pytanie do grupy:</label>
            <textarea name="question" rows="2" placeholder="np. Czy boisz się, że AI zastąpi Twoje stanowisko?" required></textarea>
        </div>

        <div class="field">
            <label>Opis grupy (demografia):</label>
            <textarea name="demographic_mix" rows="3" placeholder="np. Młodzi profesjonaliści z sektora kreatywnego, wiek 25-35 lat, duże miasta."></textarea>
        </div>

        <div class="row">
            <div class="field">
                <label>Liczba uczestników (AI):</label>
                <input type="number" name="num_personas" value="3" min="1" max="10">
            </div>
            <div class="field">
                <label>Twój e-mail:</label>
                <input type="email" name="email" placeholder="raport@domena.pl" required>
            </div>
        </div>

        <button type="submit" id="submitBtn">Uruchom symulację</button>
    </form>
    <div id="response"></div>
</div>

<script>
    const form = document.getElementById('focusForm');
    const btn = document.getElementById('submitBtn');
    const resDiv = document.getElementById('response');

    // ADRES WEBHOOKA - Pamiętaj o końcówce /webhook-test/ podczas testowania w n8n!
    const WEBHOOK_URL = 'https://jeff104-20104.mikrus.cloud/webhook/focus-group';

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // UI Reset
        btn.disabled = true;
        btn.innerText = 'Inicjalizacja agentów...';
        resDiv.style.display = 'none';

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const resultText = await response.text();

            if (response.ok) {
                resDiv.className = 'success';
                resDiv.innerText = resultText || "Sukces! Symulacja została uruchomiona.";
                form.reset();
            } else {
                resDiv.className = 'error';
                resDiv.innerText = "Błąd serwera (Status: " + response.status + "). Upewnij się, że workflow jest aktywny.";
            }
        } catch (error) {
            resDiv.className = 'error';
            resDiv.innerText = "Nie można połączyć się z n8n. Sprawdź adres URL i czy serwer działa.";
        } finally {
            resDiv.style.display = 'block';
            btn.disabled = false;
            btn.innerText = 'Uruchom symulację';
        }
    });
</script>

</body>
</html>
