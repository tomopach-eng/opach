<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>RAG Workflow</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; padding: 20px; }
        .hidden { display: none; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        button { background: #3b82f6; color: white; cursor: pointer; }
        .msg { padding: 10px; margin: 10px 0; border-radius: 5px; background: #1e293b; }
    </style>
</head>
<body>

    <div id="auth-section">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Hasło">
        <button onclick="handleLogin()">Zaloguj</button>
    </div>

    <div id="app-section" class="hidden">
        <p>Zalogowano jako: <span id="user-email"></span></p>
        <button onclick="handleLogout()" style="background:red">Wyloguj</button>
        <hr>
        <input type="file" id="file-input">
        <button onclick="uploadFile()">Wgraj plik</button>
        <div id="status"></div>
        <hr>
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Zadaj pytanie...">
        <button onclick="sendMessage()">Zapytaj</button>
    </div>

<script>
    // --- KONFIGURACJA ---
    const S_URL = 'https://sgoogjybtirsduukiiiq.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnb29nanlidGlyc2R1dWtpaWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc3MjcsImV4cCI6MjA5MTI0MzcyN30._yRZZZ3mwKIcLVmHLjo17DmafgFjH_-m0LyT3UxxQoI';
    const N8N_CHAT = 'https://jeff104-20104.mikrus.cloud/webhook/chat';
    const N8N_UP = 'https://jeff104-20104.mikrus.cloud/webhook/upload_data';

    // Inicjalizacja - TA LINIA MOŻE BYĆ TYLKO RAZ!
    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else checkUser();
    }

    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
        }
    }

    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const { data: { user } } = await supabaseClient.auth.getUser();
        
        const res = await fetch(N8N_CHAT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chatInput: input.value, userId: user.id })
        });
        const json = await res.json();
        document.getElementById('chat-box').innerHTML += `<div class="msg"><b>Ty:</b> ${input.value}</div>`;
        document.getElementById('chat-box').innerHTML += `<div class="msg"><b>AI:</b> ${json.output || json.text}</div>`;
        input.value = '';
    }

    async function uploadFile() {
    	const fileInput = document.getElementById('file-input');
    	const file = fileInput.files[0];
    	const status = document.getElementById('status');

    if (!file) {
        alert("Wybierz plik!");
        return;
    }

    // 1. Pobierz aktualnego użytkownika
    const { data: { user } } = await supabaseClient.auth.getUser();
    
    if (!user) {
        alert("Błąd: Nie jesteś zalogowany!");
        return;
    }

    console.log("Wysyłam plik dla ID:", user.id); // Sprawdź to w konsoli F12!

    // 2. Przygotuj paczkę danych
    const formData = new FormData();
    formData.append('data', file);      // Plik binarny
    formData.append('userId', user.id); // To musi tu być!
    formData.append('fileName', file.name);

    status.innerText = "Wysyłanie...";

    try {
        const res = await fetch(N8N_UP, {
            method: 'POST',
            // WAŻNE: Nie dodawaj headers: {'Content-Type': '...'}! 
            // Przeglądarka sama wstawi poprawny boundary dla FormData.
            body: formData 
        });

        if (res.ok) {
            status.innerText = "Gotowe!";
        } else {
            status.innerText = "Błąd serwera: " + res.status;
        }
    } catch (err) {
        status.innerText = "Błąd połączenia!";
        console.error(err);
    }
}
    checkUser();
</script>
</body>
</html>
