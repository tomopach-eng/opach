<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Workflow - System Ekspercki</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #3b82f6;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* Sekcja Autoryzacji */
        #auth-container {
            background: var(--card-bg);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #334155;
        }

        .auth-form input {
            padding: 8px;
            margin: 5px;
            border-radius: 4px;
            border: 1px solid #475569;
            background: #0f172a;
            color: white;
        }

        /* Layout główny */
        #main-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            flex-grow: 1;
            overflow: hidden;
        }

        /* Sidebar - Wiedza */
        #sidebar {
            background: var(--card-bg);
            padding: 20px;
            border-right: 1px solid #334155;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .file-list {
            font-size: 0.9em;
            color: #94a3b8;
        }

        /* Okno Czatu */
        #chat-container {
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        #messages {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 8px;
            line-height: 1.5;
        }

        .user-msg { background: var(--accent-color); align-self: flex-end; }
        .ai-msg { background: #334155; align-self: flex-start; }

        /* Inputy */
        .input-area {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: var(--bg-color);
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #1e293b;
            color: white;
        }

        button {
            padding: 10px 20px;
            background: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="auth-container">
    <div id="login-form" class="auth-form">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Hasło">
        <button onclick="handleLogin()">Zaloguj</button>
        <button onclick="handleSignUp()" style="background: #64748b;">Zarejestruj</button>
    </div>
    <div id="user-info" class="hidden">
        Zalogowany jako: <span id="user-email"></span>
        <button onclick="handleLogout()" style="background: #ef4444; margin-left: 10px;">Wyloguj</button>
    </div>
</div>

<div id="main-container" class="hidden">
    <div id="sidebar">
        <h3>Źródła wiedzy</h3>
        <input type="file" id="file-upload" accept=".pdf,.csv,.txt">
        <button id="upload-btn" onclick="uploadFile()">Dodaj dokument</button>
        <div id="upload-status"></div>
        
        <h4>Twoje dokumenty:</h4>
        <div id="file-list" class="file-list">Brak dokumentów</div>
    </div>

    <div id="chat-container">
        <div id="messages">
            <div class="message ai-msg">System RAG gotowy. O co chcesz zapytać?</div>
        </div>
        <div class="input-area">
            <input type="text" id="chat-input" placeholder="Zadaj pytanie...">
            <button id="send-btn" onclick="sendMessage()">Wyślij</button>
        </div>
    </div>
</div>

<script>
    // --- KONFIGURACJA ---
    const SUPABASE_URL = 'https://sgoogjybtirsduukiiiq.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnb29nanlidGlyc2R1dWtpaWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc3MjcsImV4cCI6MjA5MTI0MzcyN30._yRZZZ3mwKIcLVmHLjo17DmafgFjH_-m0LyT3UxxQoI';
    const N8N_CHAT_WEBHOOK = 'https://n8n.TWOJA.DOMENA/webhook/chat';
    const N8N_UPLOAD_WEBHOOK = 'https://n8n.TWOJA.DOMENA/webhook/upload_data';

    const supabase = window.supabase.createClient(sb_publishable__DtAu7X4BEKtsNAhn0k1-w_J6cYsk5n, SUPABASE_KEY);

    // --- AUTORYZACJA ---
    async function updateUI() {
        const { data: { user } } = await supabase.auth.getUser();
        if (user) {
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('main-container').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            loadFileList();
        } else {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('user-info').classList.add('hidden');
            document.getElementById('main-container').classList.add('hidden');
        }
    }

    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) alert(error.message);
        else updateUI();
    }

    async function handleSignUp() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) alert(error.message);
        else alert('Sprawdź email, aby potwierdzić rejestrację!');
    }

    async function handleLogout() {
        await supabase.auth.signOut();
        updateUI();
    }

    // --- CZAT ---
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user-msg');
        input.value = '';
        
        const { data: { user } } = await supabase.auth.getUser();

        try {
            const response = await fetch(N8N_CHAT_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    chatInput: text, 
                    userId: user.id 
                })
            });
            const data = await response.json();
            addMessage(data.output || data.text || "Brak odpowiedzi", 'ai-msg');
        } catch (e) {
            addMessage("Błąd połączenia z n8n.", 'ai-msg');
        }
    }

    function addMessage(text, className) {
        const div = document.createElement('div');
        div.className = `message ${className}`;
        div.innerText = text;
        document.getElementById('messages').appendChild(div);
        document.getElementById('chat-container').scrollTop = document.getElementById('chat-container').scrollHeight;
    }

    // --- PLIKI ---
    async function uploadFile() {
        const fileInput = document.getElementById('file-upload');
        const btn = document.getElementById('upload-btn');
        const status = document.getElementById('upload-status');
        
        if (!fileInput.files[0]) return;
        
        btn.disabled = true;
        status.innerText = "Wysyłanie...";
        
        const { data: { user } } = await supabase.auth.getUser();
        const formData = new FormData();
        formData.append('data', fileInput.files[0]);
        formData.append('userId', user.id);
        formData.append('fileName', fileInput.files[0].name);

        try {
            await fetch(N8N_UPLOAD_WEBHOOK, { method: 'POST', body: formData });
            status.innerText = "Sukces!";
            setTimeout(() => { status.innerText = ""; loadFileList(); }, 2000);
        } catch (e) {
            status.innerText = "Błąd uploadu.";
        } finally {
            btn.disabled = false;
        }
    }

    async function loadFileList() {
        const { data: { user } } = await supabase.auth.getUser();
        // Pobieramy unikalne nazwy plików z metadanych w Twojej tabeli
        const { data, error } = await supabase
            .from('documents')
            .select('metadata')
            .filter('metadata->>userId', 'eq', user.id);

        if (data && data.length > 0) {
            const names = [...new Set(data.map(d => d.metadata.fileName || "Nieznany plik"))];
            document.getElementById('file-list').innerHTML = names.join('<br>');
        }
    }

    // Inicjalizacja przy starcie
    updateUI();
</script>

</body>
</html>
