<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Workflow - Professional Interface</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f1f5f9;
            --msg-user: #334155;
            --msg-ai: #1e293b;
            --border: #334155;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* --- LOGOWANIE --- */
        #auth-section {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 15px;
        }
        .login-card {
            background: var(--sidebar-bg); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
        }
        .login-card h2 { margin-top: 0; text-align: center; }

        input, button { 
            padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 14px; outline: none; width: 100%;
        }
        input { background: #0f172a; color: white; margin-bottom: 10px; }
        button { 
            background: var(--accent); color: white; cursor: pointer; 
            font-weight: 600; transition: background 0.2s; border: none;
        }
        button:hover { background: var(--accent-hover); }

        /* --- UKŁAD GŁÓWNY --- */
        #app-section { display: flex; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* Sidebar */
        aside {
            width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
        }
        .user-info { margin-bottom: 30px; font-size: 13px; opacity: 0.8; }
        .upload-zone { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 20px; }
        .upload-zone h4 { margin-top: 0; }
        #status { margin-top: 10px; font-size: 12px; color: #94a3b8; }

        /* Chat Area */
        main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        
        #chat-box { 
            flex-grow: 1; overflow-y: auto; padding: 40px 10%; 
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg { 
            max-width: 80%; padding: 15px 20px; border-radius: 12px; line-height: 1.5;
            position: relative; animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg.ai { align-self: flex-start; background: var(--msg-ai); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .msg b { display: block; font-size: 11px; text-transform: uppercase; margin-bottom: 5px; opacity: 0.7; }

        /* Input Area */
        .input-container { 
            padding: 20px 10% 40px 10%; background: linear-gradient(transparent, var(--bg-dark) 20%);
        }
        .input-wrapper { 
            display: flex; background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 12px; padding: 5px; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        #chat-input { background: transparent; border: none; margin: 0; flex-grow: 1; padding: 15px; }
        #send-btn { width: auto; padding: 0 25px; margin: 5px; }

        .logout-btn { background: #ef4444; margin-top: auto; }
        .logout-btn:hover { background: #dc2626; }

    </style>
</head>
<body>

    <div id="auth-section">
        <div class="login-card">
            <h2>Witaj w RAG</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleLogin()">Zaloguj się</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <aside>
            <div class="user-info">
                <span>Zalogowano jako:</span><br>
                <strong id="user-email"></strong>
            </div>

            <div class="upload-zone">
                <h4>Baza wiedzy</h4>
                <input type="file" id="file-input">
                <button onclick="uploadFile()" style="margin-top:10px;">Wgraj dokument</button>
                <div id="status">System gotowy</div>
            </div>

            <button onclick="handleLogout()" class="logout-btn">Wyloguj</button>
        </aside>

        <main>
            <div id="chat-box">
                <div class="msg ai"><b>System</b>Witaj! W czym mogę Ci dzisiaj pomóc?</div>
            </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Zadaj pytanie dotyczące Twoich plików...">
                    <button id="send-btn" onclick="sendMessage()">Zapytaj</button>
                </div>
            </div>
        </main>
    </div>

<script>
    // --- KONFIGURACJA ---
    const S_URL = 'https://sgoogjybtirsduukiiiq.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnb29nanlidGlyc2R1dWtpaWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc3MjcsImV4cCI6MjA5MTI0MzcyN30._yRZZZ3mwKIcLVmHLjo17DmafgFjH_-m0LyT3UxxQoI';
    const N8N_CHAT = 'https://jeff104-20104.mikrus.cloud/webhook/chat';
    const N8N_UP = 'https://jeff104-20104.mikrus.cloud/webhook/upload_data';

    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    // Obsługa logowania
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Błąd logowania: " + error.message);
        else checkUser();
    }

    // Obsługa wylogowania (Naprawione)
    async function handleLogout() {
        const { error } = await supabaseClient.auth.signOut();
        if (error) alert(error.message);
        window.location.reload(); // Odśwież stronę, by wrócić do ekranu logowania
    }

    // Sprawdzanie stanu użytkownika
    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
        }
    }

    // Przewijanie czatu na dół
    function scrollChat() {
        const chatBox = document.getElementById('chat-box');
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // Wysyłanie wiadomości
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        
        // Dodaj wiadomość użytkownika do UI
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="msg user"><b>Ty</b>${text}</div>`;
        input.value = '';
        scrollChat();

        try {
            const res = await fetch(N8N_CHAT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: text, userId: user.id })
            });
            const json = await res.json();
            
            // Dodaj odpowiedź AI
            chatBox.innerHTML += `<div class="msg ai"><b>AI Assistant</b>${json.output || json.text || "Brak odpowiedzi"}</div>`;
            scrollChat();
        } catch (err) {
            chatBox.innerHTML += `<div class="msg ai" style="color: #ef4444;"><b>Błąd</b>Nie udało się połączyć z serwerem.</div>`;
        }
    }

    // Obsługa plików
    async function uploadFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return alert("Wybierz plik!");

        const { data: { user } } = await supabaseClient.auth.getUser();
        const status = document.getElementById('status');
        status.innerText = "⏳ Wysyłanie...";

        const formData = new FormData();
        formData.append('data', file);
        formData.append('userId', user.id);
        formData.append('fileName', file.name);

        try {
            await fetch(N8N_UP, { method: 'POST', body: formData });
            status.innerText = "✅ Plik wgrany pomyślnie!";
            fileInput.value = "";
        } catch (err) {
            status.innerText = "❌ Błąd wysyłania.";
        }
    }

    // Obsługa klawisza Enter
    document.getElementById('chat-input')?.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') sendMessage();
    });

    checkUser();
</script>
</body>
</html>
