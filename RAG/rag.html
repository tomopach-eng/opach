<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Workflow Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --sidebar-bg: #1e293b;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f1f5f9;
            --msg-user: #334155;
            --msg-ai: #1e293b;
            --border: #334155;
        }

        * { box-sizing: border-box; }
        body, html { 
            margin: 0; padding: 0; height: 100%; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-dark); 
            color: var(--text-main); 
            overflow: hidden;
        }

        /* --- LOGOWANIE --- */
        #auth-section {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 15px;
        }
        .login-card {
            background: var(--sidebar-bg); padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px;
        }

        input, button { 
            padding: 12px 15px; border-radius: 8px; border: 1px solid var(--border); 
            font-size: 14px; outline: none; width: 100%;
        }
        input { background: #0f172a; color: white; margin-bottom: 10px; }
        button { 
            background: var(--accent); color: white; cursor: pointer; 
            font-weight: 600; transition: background 0.2s; border: none;
        }
        button:hover { background: var(--accent-hover); }

        /* --- UKŁAD GŁÓWNY --- */
        #app-section { display: flex; height: 100vh; width: 100vw; }
        .hidden { display: none !important; }

        /* Sidebar */
        aside {
            width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 20px; flex-shrink: 0;
        }
        .user-info { margin-bottom: 25px; font-size: 13px; opacity: 0.8; }
        
        .upload-zone { padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        .upload-zone h4 { margin: 0 0 10px 0; font-size: 14px; color: var(--accent); }
        #status { margin-top: 8px; font-size: 11px; color: #94a3b8; }

        /* Lista dokumentów */
        .documents-section {
            margin-top: 20px; flex-grow: 1; overflow-y: auto;
        }
        .documents-section h4 { font-size: 14px; margin-bottom: 10px; opacity: 0.7; }
        .file-item {
            background: rgba(255,255,255,0.03); padding: 10px; border-radius: 6px;
            margin-bottom: 8px; font-size: 12px; display: flex; align-items: center;
            border: 1px solid transparent; transition: 0.2s;
        }
        .file-item:hover { border-color: var(--accent); background: rgba(255,255,255,0.07); }
        .file-icon { margin-right: 10px; font-size: 16px; }

        /* Chat Area */
        main { flex-grow: 1; display: flex; flex-direction: column; background: var(--bg-dark); }
        
        #chat-box { 
            flex-grow: 1; overflow-y: auto; padding: 40px 15%; 
            display: flex; flex-direction: column; gap: 20px;
        }

        .msg { 
            max-width: 85%; padding: 15px 20px; border-radius: 12px; line-height: 1.6;
            animation: fadeIn 0.3s ease; position: relative;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .msg.user { align-self: flex-end; background: var(--accent); color: white; border-bottom-right-radius: 2px; }
        .msg.ai { align-self: flex-start; background: var(--msg-ai); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .msg b { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; opacity: 0.6; }

        /* Input Area */
        .input-container { padding: 20px 15% 40px 15%; }
        .input-wrapper { 
            display: flex; background: var(--sidebar-bg); border: 1px solid var(--border);
            border-radius: 14px; padding: 6px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #chat-input { background: transparent; border: none; margin: 0; flex-grow: 1; padding: 12px 15px; color: white; }
        #send-btn { width: auto; padding: 0 20px; }

        .logout-btn { background: #ef4444; margin-top: 20px; padding: 10px; font-size: 12px; }
        .logout-btn:hover { background: #dc2626; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>

    <div id="auth-section">
        <div class="login-card">
            <h2 style="text-align:center; margin-top:0;">RAG Workflow</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleLogin()">Zaloguj się</button>
        </div>
    </div>

    <div id="app-section" class="hidden">
        <aside>
            <div class="user-info">
                <span style="opacity:0.6">Zalogowany:</span><br>
                <strong id="user-email"></strong>
            </div>

            <div class="upload-zone">
                <h4>+ Dodaj wiedzę</h4>
                <input type="file" id="file-input" style="font-size: 11px; padding: 5px; background: transparent;">
                <button onclick="uploadFile()" style="margin-top:10px; font-size: 12px; padding: 8px;">Wgraj plik</button>
                <div id="status">Wybierz plik PDF lub TXT</div>
            </div>

            <div class="documents-section">
                <h4>Twoje dokumenty</h4>
                <div id="file-list-container">
                    </div>
            </div>

            <button onclick="handleLogout()" class="logout-btn">Wyloguj sesję</button>
        </aside>

        <main>
            <div id="chat-box">
                </div>
            
            <div class="input-container">
                <div class="input-wrapper">
                    <input type="text" id="chat-input" placeholder="Zadaj pytanie dotyczące dokumentów...">
                    <button id="send-btn" onclick="sendMessage()">Wyślij</button>
                </div>
            </div>
        </main>
    </div>

<script>
    // --- KONFIGURACJA ---
    const S_URL = 'https://sgoogjybtirsduukiiiq.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNnb29nanlidGlyc2R1dWtpaWlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2Njc3MjcsImV4cCI6MjA5MTI0MzcyN30._yRZZZ3mwKIcLVmHLjo17DmafgFjH_-m0LyT3UxxQoI';
    const N8N_CHAT = 'https://jeff104-20104.mikrus.cloud/webhook-test/chat';
    const N8N_UP = 'https://jeff104-20104.mikrus.cloud/webhook-test/upload_data';

    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    // LOGOWANIE
    async function handleLogin() {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
        if (error) alert("Błąd: " + error.message);
        else checkUser();
    }

    // WYLOGOWANIE (NAPRAWIONE)
    async function handleLogout() {
        await supabaseClient.auth.signOut();
        window.location.reload();
    }

    // SPRAWDZANIE UŻYTKOWNIKA I INICJALIZACJA
    async function checkUser() {
        const { data: { user } } = await supabaseClient.auth.getUser();
        if (user) {
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = user.email;
            
            // Pobierz listę plików przy starcie
            loadUserDocuments(user.id);
            
            // Pierwsza wiadomość systemowa
            if(document.getElementById('chat-box').innerHTML.trim() === "") {
                addMessage("Witaj! Twoja baza wiedzy jest gotowa. O co chcesz zapytać?", "ai");
            }
        }
    }

    // POBIERANIE LISTY DOKUMENTÓW
    async function loadUserDocuments(userId) {
        const listContainer = document.getElementById('file-list-container');
        
        // Zmień 'documents' na nazwę Twojej tabeli w Supabase
        const { data, error } = await supabaseClient
            .from('documents') 
            .select('file_name')
            .eq('userId', userId);

        if (error) {
            listContainer.innerHTML = '<p style="font-size:10px; color:red;">Nie udało się pobrać listy.</p>';
            return;
        }

        if (data.length === 0) {
            listContainer.innerHTML = '<p style="font-size:11px; opacity:0.5;">Brak dokumentów w bazie.</p>';
            return;
        }

        listContainer.innerHTML = data.map(doc => `
            <div class="file-item">
                <span class="file-icon">📄</span>
                <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${doc.file_name}</span>
            </div>
        `).join('');
    }

    // WYSYŁANIE WIADOMOŚCI
    async function sendMessage() {
        const input = document.getElementById('chat-input');
        const text = input.value.trim();
        if (!text) return;

        const { data: { user } } = await supabaseClient.auth.getUser();
        addMessage(text, "user");
        input.value = '';

        try {
            const res = await fetch(N8N_CHAT, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chatInput: text, userId: user.id })
            });
            const json = await res.json();
            addMessage(json.output || json.text || "Przetworzyłem Twoje pytanie, ale nie otrzymałem odpowiedzi.", "ai");
        } catch (err) {
            addMessage("Błąd połączenia z silnikiem AI.", "ai");
        }
    }

    function addMessage(text, side) {
        const chatBox = document.getElementById('chat-box');
        const label = side === "user" ? "Ty" : "AI Assistant";
        chatBox.innerHTML += `<div class="msg ${side}"><b>${label}</b>${text}</div>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    // UPLOAD PLIKU
    async function uploadFile() {
        const fileInput = document.getElementById('file-input');
        const file = fileInput.files[0];
        if (!file) return alert("Wybierz plik!");

        const { data: { user } } = await supabaseClient.auth.getUser();
        const status = document.getElementById('status');
        status.innerText = "⏳ Przesyłanie...";

        const formData = new FormData();
        formData.append('data', file);
        formData.append('userId', user.id);
        formData.append('fileName', file.name);

        try {
            await fetch(N8N_UP, { method: 'POST', body: formData });
            status.innerText = "✅ Plik wgrany!";
            // Odśwież listę dokumentów po wgraniu
            loadUserDocuments(user.id);
            fileInput.value = "";
        } catch (err) {
            status.innerText = "❌ Błąd n8n.";
        }
    }

    // Obsługa Enter
    document.getElementById('chat-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });

    checkUser();
</script>
</body>
</html>
